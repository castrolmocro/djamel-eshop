openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Djamel E Shop API - Local Marketplace Platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profiles
    description: User profile operations
  - name: listings
    description: Product listing operations
  - name: orders
    description: Order operations
  - name: messages
    description: Messaging between users
  - name: categories
    description: Product categories
  - name: reviews
    description: Product reviews and ratings
  - name: dashboard
    description: Dashboard and statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Profiles ──────────────────────────────────────────────
  /profiles/me:
    get:
      operationId: getMyProfile
      tags: [profiles]
      summary: Get current user's profile
      security: [{ clerkAuth: [] }]
      responses:
        "200":
          description: Profile found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          description: Profile not found
    put:
      operationId: updateMyProfile
      tags: [profiles]
      summary: Update current user's profile
      security: [{ clerkAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /profiles/{userId}:
    get:
      operationId: getProfile
      tags: [profiles]
      summary: Get a user's public profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Profile found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  # ── Categories ────────────────────────────────────────────
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all product categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  # ── Listings ──────────────────────────────────────────────
  /listings:
    get:
      operationId: listListings
      tags: [listings]
      summary: List all listings with optional filters
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: city
          in: query
          schema:
            type: string
        - name: wilaya
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: search
          in: query
          schema:
            type: string
        - name: listingType
          in: query
          schema:
            type: string
            enum: [product, service, store]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated list of listings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedListings"
    post:
      operationId: createListing
      tags: [listings]
      summary: Create a new listing
      security: [{ clerkAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateListingBody"
      responses:
        "201":
          description: Listing created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"

  /listings/nearby:
    get:
      operationId: getNearbyListings
      tags: [listings]
      summary: Get listings near user's location (wilaya/city)
      parameters:
        - name: wilaya
          in: query
          required: true
          schema:
            type: string
        - name: city
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 12
      responses:
        "200":
          description: Nearby listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"

  /listings/featured:
    get:
      operationId: getFeaturedListings
      tags: [listings]
      summary: Get featured/trending listings
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 8
      responses:
        "200":
          description: Featured listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"

  /listings/{listingId}:
    get:
      operationId: getListing
      tags: [listings]
      summary: Get a single listing
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Listing found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "404":
          description: Not found
    put:
      operationId: updateListing
      tags: [listings]
      summary: Update a listing
      security: [{ clerkAuth: [] }]
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateListingBody"
      responses:
        "200":
          description: Listing updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
    delete:
      operationId: deleteListing
      tags: [listings]
      summary: Delete a listing
      security: [{ clerkAuth: [] }]
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /listings/my:
    get:
      operationId: getMyListings
      tags: [listings]
      summary: Get current user's listings
      security: [{ clerkAuth: [] }]
      responses:
        "200":
          description: My listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"

  # ── Orders ────────────────────────────────────────────────
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List current user's orders (as buyer or seller)
      security: [{ clerkAuth: [] }]
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [buyer, seller]
            default: buyer
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place an order for a listing
      security: [{ clerkAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{orderId}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order
      security: [{ clerkAuth: [] }]
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{orderId}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status (seller only)
      security: [{ clerkAuth: [] }]
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Order status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # ── Messages ──────────────────────────────────────────────
  /conversations:
    get:
      operationId: listConversations
      tags: [messages]
      summary: List user's conversations
      security: [{ clerkAuth: [] }]
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createConversation
      tags: [messages]
      summary: Start or get a conversation about a listing
      security: [{ clerkAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationBody"
      responses:
        "201":
          description: Conversation created or existing returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{conversationId}/messages:
    get:
      operationId: getMessages
      tags: [messages]
      summary: Get messages in a conversation
      security: [{ clerkAuth: [] }]
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message in a conversation
      security: [{ clerkAuth: [] }]
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  # ── Reviews ───────────────────────────────────────────────
  /listings/{listingId}/reviews:
    get:
      operationId: getListingReviews
      tags: [reviews]
      summary: Get reviews for a listing
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createReview
      tags: [reviews]
      summary: Create a review for a listing
      security: [{ clerkAuth: [] }]
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewBody"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  # ── Dashboard / Stats ─────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics for the current user
      security: [{ clerkAuth: [] }]
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed for the current user
      security: [{ clerkAuth: [] }]
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

components:
  securitySchemes:
    clerkAuth:
      type: http
      scheme: bearer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Profile:
      type: object
      properties:
        id:
          type: integer
        clerkUserId:
          type: string
        displayName:
          type: string
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        wilaya:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        country:
          type: string
          default: "DZ"
        preferredLanguage:
          type: string
          enum: [ar, fr, en]
          default: ar
        isStore:
          type: boolean
          default: false
        storeName:
          type: string
          nullable: true
        storeDescription:
          type: string
          nullable: true
        preferences:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, clerkUserId, displayName, country, preferredLanguage, isStore, createdAt]

    UpdateProfileBody:
      type: object
      properties:
        displayName:
          type: string
        bio:
          type: string
        avatarUrl:
          type: string
        phone:
          type: string
        wilaya:
          type: string
        city:
          type: string
        country:
          type: string
        preferredLanguage:
          type: string
          enum: [ar, fr, en]
        isStore:
          type: boolean
        storeName:
          type: string
        storeDescription:
          type: string
        preferences:
          type: object

    Category:
      type: object
      properties:
        id:
          type: integer
        nameAr:
          type: string
        nameFr:
          type: string
        nameEn:
          type: string
        icon:
          type: string
          nullable: true
        slug:
          type: string
      required: [id, nameAr, nameFr, nameEn, slug]

    Listing:
      type: object
      properties:
        id:
          type: integer
        sellerUserId:
          type: string
        sellerProfile:
          $ref: "#/components/schemas/Profile"
        categoryId:
          type: integer
          nullable: true
        category:
          $ref: "#/components/schemas/Category"
          nullable: true
        titleAr:
          type: string
        titleFr:
          type: string
          nullable: true
        titleEn:
          type: string
          nullable: true
        descriptionAr:
          type: string
        descriptionFr:
          type: string
          nullable: true
        descriptionEn:
          type: string
          nullable: true
        price:
          type: number
          nullable: true
        currency:
          type: string
          default: DZD
        listingType:
          type: string
          enum: [product, service, store]
        condition:
          type: string
          enum: [new, used, refurbished]
          nullable: true
        images:
          type: array
          items:
            type: string
        wilaya:
          type: string
        city:
          type: string
          nullable: true
        isActive:
          type: boolean
        isFeatured:
          type: boolean
        viewCount:
          type: integer
        averageRating:
          type: number
          nullable: true
        reviewCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, sellerUserId, titleAr, descriptionAr, wilaya, listingType, isActive, isFeatured, viewCount, reviewCount, createdAt]

    CreateListingBody:
      type: object
      properties:
        categoryId:
          type: integer
        titleAr:
          type: string
        titleFr:
          type: string
        titleEn:
          type: string
        descriptionAr:
          type: string
        descriptionFr:
          type: string
        descriptionEn:
          type: string
        price:
          type: number
        currency:
          type: string
          default: DZD
        listingType:
          type: string
          enum: [product, service, store]
        condition:
          type: string
          enum: [new, used, refurbished]
        images:
          type: array
          items:
            type: string
        wilaya:
          type: string
        city:
          type: string
      required: [titleAr, descriptionAr, wilaya, listingType]

    UpdateListingBody:
      type: object
      properties:
        categoryId:
          type: integer
        titleAr:
          type: string
        titleFr:
          type: string
        titleEn:
          type: string
        descriptionAr:
          type: string
        descriptionFr:
          type: string
        descriptionEn:
          type: string
        price:
          type: number
        currency:
          type: string
        listingType:
          type: string
          enum: [product, service, store]
        condition:
          type: string
          enum: [new, used, refurbished]
        images:
          type: array
          items:
            type: string
        wilaya:
          type: string
        city:
          type: string
        isActive:
          type: boolean

    PaginatedListings:
      type: object
      properties:
        listings:
          type: array
          items:
            $ref: "#/components/schemas/Listing"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required: [listings, total, page, totalPages]

    Order:
      type: object
      properties:
        id:
          type: integer
        buyerUserId:
          type: string
        sellerUserId:
          type: string
        listingId:
          type: integer
        listing:
          $ref: "#/components/schemas/Listing"
          nullable: true
        buyerProfile:
          $ref: "#/components/schemas/Profile"
          nullable: true
        sellerProfile:
          $ref: "#/components/schemas/Profile"
          nullable: true
        quantity:
          type: integer
          default: 1
        totalPrice:
          type: number
          nullable: true
        status:
          type: string
          enum: [pending, confirmed, shipped, delivered, cancelled]
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, buyerUserId, sellerUserId, listingId, quantity, status, createdAt]

    CreateOrderBody:
      type: object
      properties:
        listingId:
          type: integer
        quantity:
          type: integer
          default: 1
        notes:
          type: string
      required: [listingId]

    UpdateOrderStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [confirmed, shipped, delivered, cancelled]
      required: [status]

    Conversation:
      type: object
      properties:
        id:
          type: integer
        listingId:
          type: integer
          nullable: true
        listing:
          $ref: "#/components/schemas/Listing"
          nullable: true
        buyerUserId:
          type: string
        sellerUserId:
          type: string
        otherParty:
          $ref: "#/components/schemas/Profile"
          nullable: true
        lastMessage:
          $ref: "#/components/schemas/Message"
          nullable: true
        unreadCount:
          type: integer
          default: 0
        createdAt:
          type: string
          format: date-time
      required: [id, buyerUserId, sellerUserId, unreadCount, createdAt]

    CreateConversationBody:
      type: object
      properties:
        listingId:
          type: integer
        sellerUserId:
          type: string
        initialMessage:
          type: string
      required: [sellerUserId]

    Message:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        senderUserId:
          type: string
        content:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, conversationId, senderUserId, content, isRead, createdAt]

    SendMessageBody:
      type: object
      properties:
        content:
          type: string
      required: [content]

    Review:
      type: object
      properties:
        id:
          type: integer
        listingId:
          type: integer
        reviewerUserId:
          type: string
        reviewerProfile:
          $ref: "#/components/schemas/Profile"
          nullable: true
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, listingId, reviewerUserId, rating, createdAt]

    CreateReviewBody:
      type: object
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
      required: [rating]

    DashboardStats:
      type: object
      properties:
        totalListings:
          type: integer
        activeListings:
          type: integer
        totalOrders:
          type: integer
        pendingOrders:
          type: integer
        totalSales:
          type: integer
        totalPurchases:
          type: integer
        unreadMessages:
          type: integer
        averageRating:
          type: number
          nullable: true
      required: [totalListings, activeListings, totalOrders, pendingOrders, totalSales, totalPurchases, unreadMessages]

    ActivityItem:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [new_order, order_status_change, new_message, new_review, listing_view]
        titleAr:
          type: string
        titleFr:
          type: string
          nullable: true
        referenceId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, type, titleAr, createdAt]
